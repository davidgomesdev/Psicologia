name: Release

on:
  workflow_dispatch:
    inputs:
      release-track:
        type: choice
        description: Release environment
        options:
          - preview
          - production
        default: production
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - content/**
      - quartz/**
      - quartz.config.ts
      - quartz.layout.ts

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_TRACK: ${{ github.event_name == 'push' && 'production' || inputs.release-track }}

jobs:
  debug:
    runs-on: ubuntu-latest
    name: 🔍 Show input values
    steps:
      - name: Show input values
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUTS: ${{ toJSON(inputs) }}
        run: |
          echo "event-name: $EVENT_NAME"
          echo "inputs: $INPUTS"

  publish-to-cloudflare-pages:
    name: 🌐 Publish to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: 🟢 - Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 🌱 - Install dependencies
        run: npm ci

      - name: 🔨 - Build site
        run: npx quartz build

      - name: 🚀 - Deploy to Cloudflare Pages
        uses: davidgomesdev/github-actions-cloudflare-pages@03279b4a90b80274ccd646b35ca788efe82bb952 # v1.0.0
        id: pages
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-project-name: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          directory: public
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-environment: Cloudflare Pages${{ (env.RELEASE_TRACK == 'production' && '') || ' (Preview)' }}
